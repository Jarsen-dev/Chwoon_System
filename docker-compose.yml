version: '3.8'

services:

  # ==========================================
  # BASE DE DATOS
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: produccion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     planta_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB:       planta_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planta_user -d planta_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==========================================
  # BACKEND (FastAPI)
  # ==========================================
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: produccion_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://planta_user:password123@db:5432/planta_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/static:/app/static
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # FRONTEND (Next.js)
  # ==========================================
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: produccion_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://100.115.152.13:8000
      NEXT_PUBLIC_WS_URL:  ws://100.115.152.13:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ==========================================
  # PGADMIN PARA GESTIONAR LA BASE DE DATOS
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: produccion_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local